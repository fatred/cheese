#@data/values
---
namespace: cheese
base_image: errm/cheese
gateway:
  className: cloud-provider-kind
  name: cheese
  listeners:
  - protocol: HTTP
    port: 80
    name: cheese-http
    allowedRoutes:
      namespaces:
        from: Same
cheeses:
  - name: stilton
  - name: cheddar
  - name: wensleydale
version: v0.0.1
resources:
  requests:
    cpu: 100m
    memory: 50Mi
  limits:
    cpu: 100m
    memory: 50Mi
replicas: 1
container_port: 80
