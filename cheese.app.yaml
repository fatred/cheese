#@ load("@ytt:data", "data")

#@ def gen_image(image, cheese):
#@   return image + ":" + cheese
#@ end

#@ def gen_httproute_path(cheese):
#@   return "/" + cheese 
#@ end

#@ def gen_nginx_conf(cheese):
#@ return "server {\n    listen 80;\n    root /usr/share/nginx/html;\n    index index.html;\n\n    location = /" + cheese + " {\n        return 301 /" + cheese + "/;\n    }\n\n    location /" + cheese + "/ {\n        alias /usr/share/nginx/html/;\n    }\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n}\n"
#@ end

---
kind: Namespace
apiVersion: v1
metadata:
  name: #@ data.values.namespace

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: #@ data.values.gateway.name
  namespace: #@ data.values.namespace
spec:
  gatewayClassName: #@ data.values.gateway.className
  listeners: #@ data.values.gateway.listeners

#@ for/end cheese in data.values.cheeses:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: #@ cheese.name + "-nginx-conf"
  namespace: #@ data.values.namespace
data:
  default.conf: #@ gen_nginx_conf(cheese.name)

#@ for/end cheese in data.values.cheeses:
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: #@ cheese.name
  namespace: #@ data.values.namespace
  labels:
    app: cheese
    cheese: #@ cheese.name
spec:
  replicas: #@ data.values.replicas
  selector:
    matchLabels:
      app: cheese
      task: #@ cheese.name
  template:
    metadata:
      labels:
        app: cheese
        task: #@ cheese.name
        version: #@ data.values.version
    spec:
      containers:
      - name: cheese
        image: #@ gen_image(data.values.base_image, cheese.name)
        resources: #@ data.values.resources
        ports:
        - containerPort: #@ data.values.container_port
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-conf
        configMap:
          name: #@ cheese.name + "-nginx-conf"

#@ for/end cheese in data.values.cheeses:
---
apiVersion: v1
kind: Service
metadata:
  name: #@ cheese.name
  namespace: #@ data.values.namespace
spec:
  ports:
  - name: http
    targetPort: #@ data.values.container_port
    port: 80
  selector:
    app: cheese
    task: #@ cheese.name

#@ for/end cheese in data.values.cheeses:
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: #@ cheese.name
  namespace: #@ data.values.namespace
spec:
  parentRefs:
  - kind: Gateway
    name: cheese
    namespace: #@ data.values.namespace
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: #@ gen_httproute_path(cheese.name)
    backendRefs:
    - name: #@ cheese.name
      port: #@ data.values.container_port

